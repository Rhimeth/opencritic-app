<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Details – GameScore AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 text-gray-200">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="mb-6"><a href="/" class="text-blue-400 hover:underline">← Back to Hub</a></div>
        <div id="gameContent">Loading...</div>
    </div>
    <script>
        const title = decodeURIComponent(window.location.pathname.split('/').pop());
        async function loadGame() {
            const res = await fetch(`/game/${encodeURIComponent(title)}`);
            if (!res.ok) {
                document.getElementById('gameContent').innerHTML = '<div class="text-center text-red-400">Game not found.</div>';
                return;
            }
            const game = await res.json();
            let html = `
                <h1 class="text-3xl font-bold text-blue-400 mb-2">${game.title}</h1>
                <div class="bg-neutral-900 rounded-2xl p-5 space-y-2">
                    <p><span class="text-gray-400">Score:</span> <strong class="text-xl">${game.score}</strong></p>
                    <p><span class="text-gray-400">Genre:</span> ${game.genre}</p>
                    <p><span class="text-gray-400">Platform:</span> ${game.platform}</p>
                    <p><span class="text-gray-400">Developer:</span> ${game.developer}</p>
                    <p><span class="text-gray-400">Publisher:</span> ${game.publisher}</p>
                    <p><span class="text-gray-400">Release Date:</span> ${game.release_date}</p>
                    <p><span class="text-gray-400">Description:</span> ${game.description_summary || game.description}</p>
                </div>
                <div class="mt-6"><a href="/search" class="text-sm text-blue-400 hover:underline">← Search for more games</a></div>
            `;
            document.getElementById('gameContent').innerHTML = html;
        }
        loadGame();
    </script>
</body>
</html>
