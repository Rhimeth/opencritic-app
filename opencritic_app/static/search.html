<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Games – GameScore AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 text-gray-200">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="mb-6"><a href="/" class="text-blue-400 hover:underline">← Back to Hub</a></div>
        <h1 class="text-2xl font-bold mb-4">Search Results</h1>
        <div id="results" class="space-y-3"></div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const query = params.get('q');
        if (!query) document.getElementById('results').innerHTML = '<p class="text-gray-400">No search term provided.</p>';
        else {
            fetch(`/search?q=${encodeURIComponent(query)}&limit=30`)
                .then(res => res.json())
                .then(data => {
                    if (data.results.length === 0) {
                        document.getElementById('results').innerHTML = '<p class="text-gray-400">No games found.</p>';
                        return;
                    }
                    let html = '';
                    for (let g of data.results) {
                        html += `<div class="bg-neutral-900 rounded-2xl p-4 hover:bg-neutral-800 transition"><a href="/game-page/${encodeURIComponent(g.title)}" class="block"><div class="font-semibold">${g.title}</div><div class="text-sm text-gray-400">${g.genre} | ${g.platform} | ${g.developer}</div><div class="text-blue-400 mt-1">Score: ${g.score}</div></a></div>`;
                    }
                    document.getElementById('results').innerHTML = html;
                });
        }
    </script>
</body>
</html>
