<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Hub – GameScore AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #09090b; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-neutral-950 text-gray-200 font-sans">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-6">
            <a href="/" class="text-blue-400 hover:underline">← Back to Hub</a>
        </div>
        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent mb-2">Gaming News</h1>
        <p class="text-gray-400 mb-6">Latest headlines from top sources, summarized</p>

        <div class="mb-6 max-w-md">
            <input type="text" id="newsFilter" placeholder="Filter news by keyword..." class="w-full bg-neutral-800 rounded-full px-4 py-2 border border-neutral-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div id="newsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        async function loadNews() {
            const res = await fetch('/api/news?per_source=8&deduplicate=true');
            const data = await res.json();
            const container = document.getElementById('newsContainer');
            if (!data.news || data.news.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center col-span-3">No news available.</p>';
                return;
            }
            // Group by source
            const grouped = {};
            for (let item of data.news) {
                if (!grouped[item.source]) grouped[item.source] = [];
                grouped[item.source].push(item);
            }
            let html = '';
            for (let [source, articles] of Object.entries(grouped)) {
                html += `<div class="bg-neutral-900 rounded-2xl p-5 shadow-lg border border-neutral-800">
                            <h3 class="text-xl font-bold text-blue-400 mb-4 border-b border-neutral-700 pb-2">${source}</h3>
                            <div class="space-y-4">`;
                for (let art of articles.slice(0, 6)) {
                    const date = new Date(art.published).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
                    html += `<div>
                                <a href="${art.link}" target="_blank" class="text-gray-200 font-semibold hover:text-blue-400 transition">${art.title}</a>
                                <p class="text-sm text-gray-400 mt-1">${art.summary.substring(0, 160)}…</p>
                                <div class="text-xs text-gray-500 mt-2">${date}</div>
                            </div>`;
                }
                html += `</div></div>`;
            }
            container.innerHTML = html;
            // Filter
            document.getElementById('newsFilter').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll('.bg-neutral-900').forEach(card => {
                    const text = card.innerText.toLowerCase();
                    card.style.display = text.includes(term) ? '' : 'none';
                });
            });
        }
        loadNews();
    </script>
</body>
</html>
