<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameScore AI – Gaming Intelligence Hub</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom overrides -->
    <style>
        body { background: #09090b; }
        .tab-active { border-bottom-width: 2px; transform: translateY(-1px); }
        .card-hover { transition: all 0.2s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 20px -8px rgba(0,0,0,0.4); }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-neutral-950 text-gray-200 font-sans antialiased">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-5xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">GameScore AI</h1>
            <p class="text-gray-400 mt-2">Intelligent game news · analytics · developer profiles</p>
        </div>

        <!-- Search Bar (optional) -->
        <div class="max-w-xl mx-auto mb-12">
            <div class="relative">
                <input type="text" id="globalSearch" placeholder="Search games, developers, news..." class="w-full bg-neutral-800 text-gray-200 rounded-full py-3 px-5 pl-12 border border-neutral-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <svg class="absolute left-4 top-3.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>

        <!-- Colored Tabs -->
        <div class="flex justify-center space-x-2 border-b border-neutral-800 mb-8">
            <button id="tabNews" class="tab-button px-6 py-3 font-semibold text-blue-400 border-b-2 border-blue-400 transition-all">News</button>
            <button id="TabAnalytics" class="tab-button px-6 py-3 font-semibold text-gray-400 hover:text-gray-200 transition-all">Analytics</button>
            <button id="TabDevelopers" class="tab-button px-6 py-3 font-semibold text-gray-400 hover:text-gray-200 transition-all">Developers</button>
        </div>

        <!-- Dynamic Content Container -->
        <div id="contentContainer" class="fade-in">
            <!-- Initially load News -->
        </div>
    </div>

    <script>
        // Helper to show loading state
        function showLoading(container) {
            container.innerHTML = `<div class="text-center py-10"><div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div><p class="mt-3 text-gray-400">Loading...</p></div>`;
        }

        // Fetch and render News
        async function loadNews() {
            const container = document.getElementById('contentContainer');
            showLoading(container);
            const res = await fetch('/api/news?per_source=8&deduplicate=true');
            const data = await res.json();
            if (!data.news || data.news.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400">No news found.</p>';
                return;
            }
            // Group by source for better presentation
            const grouped = {};
            for (let item of data.news) {
                if (!grouped[item.source]) grouped[item.source] = [];
                grouped[item.source].push(item);
            }
            let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
            for (let [source, articles] of Object.entries(grouped)) {
                html += `<div class="bg-neutral-900 rounded-2xl p-5 shadow-lg border border-neutral-800">
                            <h3 class="text-xl font-bold text-blue-400 mb-4">${source}</h3>
                            <div class="space-y-4">`;
                for (let art of articles.slice(0, 5)) {
                    const date = new Date(art.published).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
                    html += `<div><a href="${art.link}" target="_blank" class="text-gray-200 font-semibold hover:text-blue-400 transition">${art.title}</a>
                             <p class="text-sm text-gray-400 mt-1">${art.summary.substring(0, 150)}…</p>
                             <div class="text-xs text-gray-500 mt-2">${date}</div></div>`;
                }
                html += `</div></div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
            container.classList.add('fade-in');
            setTimeout(() => container.classList.remove('fade-in'), 400);
        }

        // Fetch and render Analytics (stats page preview)
        async function loadAnalytics() {
            const container = document.getElementById('contentContainer');
            showLoading(container);
            const res = await fetch('/analytics/stats');
            const data = await res.json();
            if (!data.developer_scores || Object.keys(data.developer_scores).length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400">No analytics data available.</p>';
                return;
            }
            // Show top developers, genres, and a link to full stats page
            let html = `<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-neutral-900 rounded-2xl p-5">
                    <h3 class="text-xl font-bold text-purple-400 mb-4">Top Developers</h3>
                    <div class="space-y-2">`;
            for (let [dev, score] of Object.entries(data.developer_scores).slice(0, 10)) {
                html += `<div class="flex justify-between items-center"><span class="text-gray-200">${dev}</span><span class="font-mono text-purple-300">${score}</span></div>`;
            }
            html += `</div><div class="mt-4 text-right"><a href="/stats" class="text-sm text-purple-400 hover:underline">View full analytics →</a></div></div>`;
            // Also show genre scores
            html += `<div class="bg-neutral-900 rounded-2xl p-5"><h3 class="text-xl font-bold text-green-400 mb-4">Top Genres</h3><div class="space-y-2">`;
            for (let [genre, score] of Object.entries(data.genre_scores).slice(0, 10)) {
                html += `<div class="flex justify-between"><span>${genre}</span><span class="font-mono text-green-300">${score}</span></div>`;
            }
            html += `</div></div></div>`;
            container.innerHTML = html;
        }

        // Fetch and render Developers list
        async function loadDevelopers() {
            const container = document.getElementById('contentContainer');
            showLoading(container);
            const res = await fetch('/api/developers');
            const developers = await res.json();
            if (!developers.length) {
                container.innerHTML = '<p class="text-center text-gray-400">No developers found.</p>';
                return;
            }
            let html = `<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">`;
            for (let dev of developers.slice(0, 30)) {
                html += `<a href="/developer/${encodeURIComponent(dev.developer)}" class="bg-neutral-900 rounded-xl p-4 hover:bg-neutral-800 transition card-hover block">
                            <div class="font-semibold text-gray-200">${dev.developer}</div>
                            <div class="flex justify-between mt-2 text-sm"><span class="text-gray-400">Avg Score</span><span class="text-blue-400">${dev.avg_score.toFixed(1)}</span></div>
                            <div class="flex justify-between text-sm"><span class="text-gray-400">Games</span><span>${dev.game_count}</span></div>
                         </a>`;
            }
            html += `</div><div class="mt-6 text-center"><a href="/developers" class="inline-block bg-neutral-800 hover:bg-neutral-700 text-gray-200 py-2 px-5 rounded-full transition">Browse all developers →</a></div>`;
            container.innerHTML = html;
        }

        // Tab switching logic
        let currentTab = 'news';
        function setActiveTab(tabId) {
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('text-blue-400', 'border-blue-400', 'font-semibold');
                btn.classList.add('text-gray-400', 'border-transparent');
            });
            const activeBtn = document.getElementById(tabId === 'news' ? 'tabNews' : (tabId === 'analytics' ? 'TabAnalytics' : 'TabDevelopers'));
            activeBtn.classList.remove('text-gray-400', 'border-transparent');
            activeBtn.classList.add('text-blue-400', 'border-blue-400', 'font-semibold');
            if (tabId === 'news') loadNews();
            else if (tabId === 'analytics') loadAnalytics();
            else loadDevelopers();
        }

        document.getElementById('tabNews').addEventListener('click', () => setActiveTab('news'));
        document.getElementById('TabAnalytics').addEventListener('click', () => setActiveTab('analytics'));
        document.getElementById('TabDevelopers').addEventListener('click', () => setActiveTab('developers'));

        // Initial load
        loadNews();

        // Global search (optional, redirects to /search-page?q=...)
        const searchInput = document.getElementById('globalSearch');
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && searchInput.value.trim()) {
                window.location.href = `/search-page?q=${encodeURIComponent(searchInput.value.trim())}`;
            }
        });
    </script>
</body>
</html>
