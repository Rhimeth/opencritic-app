<!DOCTYPE html>
<html>
<head>
    <title>GameScore AI</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px; }
        input, select, button { margin: 5px; padding: 8px; }
        .result { background: #f0f0f0; margin-top: 20px; padding: 15px; border-radius: 8px; }
        hr { margin: 20px 0; }
    </style>
</head>
<body>
    <h1>🎮 GameScore AI – Predict & Discover</h1>

    <h2>Predict a Game's Score</h2>
    <input type="text" id="title" placeholder="Game title (optional)" size="30"><br>
    <input type="text" id="genre" placeholder="Genre (e.g. Action)">
    <input type="text" id="platform" placeholder="Platform (e.g. PC)">
    <input type="text" id="developer" placeholder="Developer">
    <input type="text" id="publisher" placeholder="Publisher">
    <button onclick="predict()">Predict Score</button>
    <div id="predictionResult" class="result"></div>

    <h2>Get Recommendations</h2>
    <input type="text" id="recTitle" placeholder="Game title (e.g. Elden Ring)" size="30">
    <button onclick="recommend()">Recommend</button>
    <div id="recResult" class="result"></div>

    <h2>Latest Gaming News</h2>
    <button onclick="loadNews()">Refresh News</button>
    <div id="newsResult" class="result"></div>

    <script>
        async function predict() {
            const data = {
                reviews: 0,
                percent_recommended: 0,
                genre: document.getElementById('genre').value || 'Unknown',
                platform: document.getElementById('platform').value || 'Unknown',
                developer: document.getElementById('developer').value || 'Unknown',
                publisher: document.getElementById('publisher').value || 'Unknown'
            };
            const res = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const json = await res.json();
            document.getElementById('predictionResult').innerHTML = `<strong>Predicted Score:</strong> ${json.predicted_score}`;
        }

        async function recommend() {
            const title = document.getElementById('recTitle').value;
            if (!title) return;
            const res = await fetch('/recommend', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: title, k: 5 })
            });
            const json = await res.json();
            let html = '<ul>';
            for (let g of json.recommendations) {
                html += `<li><strong>${g.title}</strong> (Score: ${g.score}) – ${g.genre} | ${g.platform}<br>Similarity: ${g.similarity}</li>`;
            }
            html += '</ul>';
            document.getElementById('recResult').innerHTML = html;
        }

        async function loadNews() {
            const res = await fetch('/news?per_source=3&deduplicate=true');
            const json = await res.json();
            let html = '<ul>';
            for (let item of json.news) {
                html += `<li><strong>${item.title}</strong><br><small>${item.source} – ${item.published}</small><br>${item.summary}<br><a href="${item.link}" target="_blank">Read more</a></li><hr>`;
            }
            html += '</ul>';
            document.getElementById('newsResult').innerHTML = html;
        }

        loadNews(); // initial load
    </script>
</body>
</html>
