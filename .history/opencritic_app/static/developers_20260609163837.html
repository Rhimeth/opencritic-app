<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameScore AI – Game Developers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <style>
        body { background: #f8f9fa; font-family: 'Inter', sans-serif; }
        .container { max-width: 1200px; }
        h1 { font-weight: 600; letter-spacing: -0.01em; }
        .table thead th { border-bottom-width: 1px; }
        .developer-link { text-decoration: none; color: #0d6efd; font-weight: 500; }
        .developer-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container py-5">
    <h1 class="mb-4">Game Developers</h1>
    <p class="text-muted mb-4">Browse developers by average critic score and number of games.</p>
    <div class="table-responsive">
        <table id="developersTable" class="table table-striped">
            <thead>
                <tr><th>Developer</th><th>Average Score</th><th>Games Count</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>
<script>
    async function loadDevelopers() {
        const res = await fetch('/api/developers');
        const developers = await res.json();
        const tbody = document.querySelector('#developersTable tbody');
        tbody.innerHTML = '';
        for (let dev of developers) {
            const row = `<tr>
                <td><a href="/developer/${encodeURIComponent(dev.developer)}" class="developer-link">${dev.developer}</a></td>
                <td>${dev.avg_score.toFixed(1)}</td>
                <td>${dev.game_count}</td>
            </tr>`;
            tbody.insertAdjacentHTML('beforeend', row);
        }
        $('#developersTable').DataTable({ order: [[1, 'desc']], pageLength: 25 });
    }
    loadDevelopers();
</script>
</body>
</html>
