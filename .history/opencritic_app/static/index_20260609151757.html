<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameScore AI – Intelligence for Gamers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .hero { padding: 5rem 0; text-align: center; }
        .btn-large { border-radius: 40px; padding: 0.75rem 2rem; font-weight: 500; }
        .card-link { text-decoration: none; color: inherit; }
        .card-link:hover .card { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1 class="display-4 fw-bold">GameScore AI</h1>
        <p class="lead text-muted">Intelligent game analytics, news summarization, and score predictions.</p>
        <div class="row justify-content-center mt-5 g-4">
            <div class="col-md-5">
                <a href="/news-page" class="card-link">
                    <div class="card p-4 text-center h-100">
                        <h3>News Hub</h3>
                        <p class="text-muted">Summarized gaming headlines from top sources</p>
                    </div>
                </a>
            </div>
            <div class="col-md-5">
                <a href="/stats" class="card-link">
                    <div class="card p-4 text-center h-100">
                        <h3>Game Analytics</h3>
                        <p class="text-muted">Explore scores, trends, and predict future games</p>
                    </div>
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
