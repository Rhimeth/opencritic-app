<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameScore AI – Developer Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <style>
        body { background: #f8f9fa; font-family: 'Inter', sans-serif; }
        .container { max-width: 1000px; }
        .stat-card { background: white; border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
<div class="container py-5">
    <div id="content">Loading...</div>
</div>
<script>
    const devName = decodeURIComponent(window.location.pathname.split('/').pop());
    async function loadDeveloper() {
        const res = await fetch(`/api/developer/${encodeURIComponent(devName)}`);
        if (!res.ok) {
            document.getElementById('content').innerHTML = '<div class="alert alert-danger">Developer not found.</div>';
            return;
        }
        const data = await res.json();
        let html = `
            <h1>${data.developer}</h1>
            <div class="row g-3 mb-4">
                <div class="col-md-4"><div class="stat-card text-center"><h3>${data.avg_score.toFixed(1)}</h3><p class="text-muted">Average Score</p></div></div>
                <div class="col-md-4"><div class="stat-card text-center"><h3>${data.game_count}</h3><p class="text-muted">Games Developed</p></div></div>
            </div>
            <div class="card"><div class="card-header fw-bold">Games</div><div class="card-body"><table id="gamesTable" class="table table-striped"><thead><tr><th>Title</th><th>Score</th><th>Release Date</th><th>Platform</th><th>Genre</th></tr></thead><tbody>`;
        for (let game of data.games) {
            html += `<tr><td>${game.title}</td><td>${game.score}</td><td>${game.release_date}</td><td>${game.platform}</td><td>${game.genre}</td></tr>`;
        }
        html += `</tbody></table></div></div>`;
        document.getElementById('content').innerHTML = html;
        $('#gamesTable').DataTable({ order: [[1, 'desc']] });
    }
    loadDeveloper();
</script>
</body>
</html>
