<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameScore AI – News Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .news-card {
            border-radius: 20px;
            border: none;
            transition: 0.2s;
            margin-bottom: 1.5rem;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .news-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .source-header {
            font-weight: 600;
            font-size: 1.2rem;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }
        .news-item {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e9ecef;
        }
        .news-item:last-child {
            border-bottom: none;
        }
        .news-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .news-summary {
            color: #6c757d;
            font-size: 0.9rem;
        }
        .news-meta {
            font-size: 0.8rem;
            color: #adb5bd;
            margin-top: 0.5rem;
        }
        .filter-input {
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            border: 1px solid #dee2e6;
        }
        h1 {
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        a {
            color: #0d6efd;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="text-center mb-5">
        <h1>Gaming News</h1>
        <p class="text-muted">Latest headlines from trusted sources, summarized</p>
    </div>

    <div class="row justify-content-center mb-4">
        <div class="col-md-6">
            <input type="text" id="newsFilter" class="form-control filter-input" placeholder="Filter by keyword...">
        </div>
    </div>

    <div id="newsContainer" class="row">
        <div class="col-12 text-center">Loading news...</div>
    </div>
</div>

<script>
    async function loadNews() {
        const res = await fetch('/api/news?per_source=10&deduplicate=true');
        const data = await res.json();
        const container = document.getElementById('newsContainer');
        container.innerHTML = '';

        // Group by source
        const grouped = {};
        for (let item of data.news) {
            let source = item.source;
            if (!grouped[source]) grouped[source] = [];
            grouped[source].push(item);
        }

        for (let [source, articles] of Object.entries(grouped)) {
            const colDiv = document.createElement('div');
            colDiv.className = 'col-md-6 col-lg-4 mb-4';
            colDiv.innerHTML = `
                <div class="card news-card p-4">
                    <div class="source-header">${source}</div>
                    <div class="news-list"></div>
                </div>
            `;
            container.appendChild(colDiv);
            const newsList = colDiv.querySelector('.news-list');
            articles.forEach(art => {
                const date = new Date(art.published).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                newsList.innerHTML += `
                    <div class="news-item">
                        <div class="news-title"><a href="${art.link}" target="_blank">${art.title}</a></div>
                        <div class="news-summary">${art.summary}</div>
                        <div class="news-meta">${date}</div>
                    </div>
                `;
            });
        }

        // Filtering
        document.getElementById('newsFilter').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.news-card');
            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(term) ? '' : 'none';
            });
        });
    }

    loadNews();
</script>
</body>
</html>
